<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .car {
            background: white;
            margin: 10px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .car img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .car p {
            margin: 8px;
        }
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>Achat & Vente de voitures</p>
</header>

<div class="container">

    <h2>🚗 Voitures</h2>
    <div id="carList"></div>

    <h2>📤 Ajouter une voiture</h2>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">
    <input id="image" placeholder="Image URL">
    <input id="annee" placeholder="Année">
    <input id="km" placeholder="Kilométrage">
    <input id="ville" placeholder="Ville">

    <select id="transmission">
        <option>Manuelle</option>
        <option>Automatique</option>
        <option>Semi-automatique</option>
    </select>

    <select id="carburant">
        <option>Essence</option>
        <option>Diesel</option>
        <option>Électrique</option>
    </select>

    <select id="carrosserie">
        <option>Berline</option>
        <option>SUV</option>
        <option>Citadine</option>
        <option>Coupé</option>
    </select>

    <select id="couleur">
        <option>Noir</option>
        <option>Blanc</option>
        <option>Gris</option>
        <option>Bleu</option>
    </select>

    <select id="sieges">
        <option>2</option>
        <option>4</option>
        <option>5</option>
        <option>7</option>
    </select>

    <button onclick="addCar()">Ajouter</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 CONFIG FIREBASE (motoaFree)
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =====================
// ADD CAR
// =====================
window.addCar = async function () {

    console.log("👉 addCar exécuté");

    try {

        let marque = document.getElementById("marque").value;
        let modele = document.getElementById("modele").value;
        let prix = document.getElementById("prix").value;
        let image = document.getElementById("image").value;

        if (!image) {
            image = "https://picsum.photos/250/150";
        }

        console.log("Avant addDoc");

        const result = await addDoc(collection(db, "cars"), {
            marque,
            modele,
            prix,
            image
        });

        console.log("✅ Ajout OK ID:", result.id);

        alert("Voiture ajoutée 🚗");

        await loadCars();

        // RESET FORM
        document.getElementById("marque").value = "";
        document.getElementById("modele").value = "";
        document.getElementById("prix").value = "";
        document.getElementById("image").value = "";

    } catch (e) {
        console.error("❌ ERREUR:", e);
        alert("Erreur Firebase");
    }
};

// =====================
// LOAD CARS
// =====================
window.loadCars = async function () {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    console.log("Cars reçues:", snapshot.size);

    snapshot.forEach((doc) => {

        let car = doc.data();

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <img src="${car.image}">
            <p><b>${car.marque} ${car.modele}</b></p>
            <p>💰 ${car.prix} FCFA</p>
        `;

        container.appendChild(div);
    });
};

// INIT
window.onload = function () {
    loadCars();
};

</script>

</body>
</html>

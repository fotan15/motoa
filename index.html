<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
		body {
			font-family: Arial;
			background: #f0f2f5;
			margin: 0;
		}

		header {
			background: #007BFF;
			color: white;
			text-align: center;
			padding: 15px;
			position: sticky;
			top: 0;
		}

		.container {
			width: 95%;
			margin: auto;
		}

		input {
			width: 100%;
			padding: 12px;
			margin: 5px 0;
			border-radius: 8px;
			border: 1px solid #ccc;
		}

		button {
			width: 100%;
			padding: 12px;
			margin: 5px 0;
			background: #007BFF;
			color: white;
			border: none;
			border-radius: 8px;
			font-size: 16px;
		}

		.car {
			background: white;
			margin: 10px 0;
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 2px 5px rgba(0,0,0,0.1);
		}

		.car img {
			width: 100%;
			height: 180px;
			object-fit: cover;
		}

		.car p {
			margin: 8px;
			font-size: 16px;
		}
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>La voiture facile en Afrique</p>

    <p id="userInfo">Chargement...</p>

    <button id="loginBtn" onclick="goLogin()">Connexion</button>
    <button id="logoutBtn" onclick="logout()">Déconnexion</button>
</header>

<div class="container">

	<h2>🚗 Voitures</h2>

	<input id="search" placeholder="🔍 Rechercher (Toyota, BMW...)">
	<input id="maxPrice" placeholder="💰 Prix max">

	<button onclick="filterCars()">Filtrer</button>
	<button onclick="resetFilter()">Reset</button>

	<div id="carList"></div>

	<h2>📤 Ajouter une voiture</h2>

	<input id="marque" placeholder="Marque">
	<input id="modele" placeholder="Modèle">
	<input id="prix" placeholder="Prix">
	<input id="image" placeholder="Image URL">
	<input id="annee" placeholder="Année">
	<input id="km" placeholder="Kilométrage">
	<input id="ville" placeholder="Ville">

	<select id="transmission">
		<option value="Manuelle">Manuelle</option>
		<option value="Automatique">Automatique</option>
		<option value="Semi-automatique">Semi-automatique</option>
	</select>

	<select id="carburant">
		<option>Essence</option>
		<option>Diesel</option>
		<option>Électrique</option>
	</select>

	<select id="carrosserie">
		<option>Berline</option>
		<option>SUV</option>
		<option>Citadine</option>
		<option>Coupé</option>
		<option>Pickup</option>
	</select>

	<select id="couleur">
		<option>Noir</option>
		<option>Blanc</option>
		<option>Gris</option>
		<option>Bleu</option>
		<option>Rouge</option>
	</select>

	<select id="sieges">
		<option>2</option>
		<option>4</option>
		<option>5</option>
		<option>7</option>
	</select>

	<label><input type="checkbox" value="ABS" class="extra"> ABS</label>
	<label><input type="checkbox" value="Bluetooth" class="extra"> Bluetooth</label>
	<label><input type="checkbox" value="GPS" class="extra"> GPS</label>
	<label><input type="checkbox" value="Caméra" class="extra"> Caméra</label>

	<button onclick="addCar()">Ajouter</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// ✅ CONFIG CORRIGÉE (motoaFree)
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// ================= AUTH =================
onAuthStateChanged(auth, async (user) => {

	currentUser = user;

	const loginBtn = document.getElementById("loginBtn");
	const logoutBtn = document.getElementById("logoutBtn");

	if (!user) {
		document.getElementById("userInfo").innerText = "Non connecté";
		loginBtn.style.display = "block";
		logoutBtn.style.display = "none";
		loadCars();
		return;
	}

	const userDoc = await getDoc(doc(db, "users", user.uid));
	let role = userDoc.exists() ? userDoc.data().role : "unknown";

	document.getElementById("userInfo").innerText =
		"Connecté : " + user.email + " (" + role + ")";

	loginBtn.style.display = "none";
	logoutBtn.style.display = "block";

	loadCars();
});

// ================= ADD CAR =================
window.addCar = async function () {

	if (!currentUser) {
		alert("Connecte-toi d'abord !");
		return;
	}

	let marque = document.getElementById("marque").value;
	let modele = document.getElementById("modele").value;
	let prix = document.getElementById("prix").value;
	let image = document.getElementById("image").value || "https://picsum.photos/250/150";
	let annee = document.getElementById("annee").value;
	let km = document.getElementById("km").value;
	let ville = document.getElementById("ville").value;

	let transmission = document.getElementById("transmission").value;
	let carburant = document.getElementById("carburant").value;
	let carrosserie = document.getElementById("carrosserie").value;
	let couleur = document.getElementById("couleur").value;
	let sieges = document.getElementById("sieges").value;

	let extras = [];
	document.querySelectorAll(".extra:checked").forEach(e => extras.push(e.value));

	await addDoc(collection(db, "cars"), {
		marque,
		modele,
		prix,
		image,
		annee,
		km,
		ville,
		userId: currentUser.uid,
		options: { transmission, carburant, carrosserie, couleur, sieges, extras }
	});

	alert("Voiture ajoutée 🚗");

	loadCars();
};

// ================= LOAD =================
window.loadCars = async function () {

	let container = document.getElementById("carList");
	container.innerHTML = "";

	const snapshot = await getDocs(collection(db, "cars"));

	snapshot.forEach((doc) => {

		let car = doc.data();

		let div = document.createElement("div");
		div.className = "car";

		div.innerHTML = `
			<img src="${car.image}">
			<p><b>${car.marque} ${car.modele}</b></p>
			<p>💰 ${car.prix} FCFA</p>
			<p>📍 ${car.ville || ""}</p>
		`;

		container.appendChild(div);
	});
};

// ================= NAV =================
window.goLogin = () => window.location.href = "login.html";
window.logout = () => signOut(auth);

</script>

</body>
</html>

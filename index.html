<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .car {
            background: white;
            margin: 10px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .car img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .car p {
            margin: 8px;
        }
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>La voiture facile en Afrique</p>
</header>

<div class="container">

    <h2>🚗 Voitures</h2>
    <div id="carList"></div>

    <h2>📤 Ajouter une voiture</h2>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">
    <input id="image" placeholder="Image URL">
    <input id="annee" placeholder="Année">
    <input id="km" placeholder="Kilométrage">
    <input id="ville" placeholder="Ville">

    <select id="transmission">
        <option>Manuelle</option>
        <option>Automatique</option>
        <option>Semi-automatique</option>
    </select>

    <select id="carburant">
        <option>Essence</option>
        <option>Diesel</option>
        <option>Électrique</option>
    </select>

    <select id="carrosserie">
        <option>Berline</option>
        <option>SUV</option>
        <option>Citadine</option>
        <option>Coupé</option>
        <option>Pickup</option>
    </select>

    <select id="couleur">
        <option>Noir</option>
        <option>Blanc</option>
        <option>Gris</option>
        <option>Bleu</option>
        <option>Rouge</option>
    </select>

    <select id="sieges">
        <option>2</option>
        <option>4</option>
        <option>5</option>
        <option>7</option>
    </select>

    <label><input type="checkbox" class="extra" value="ABS"> ABS</label>
    <label><input type="checkbox" class="extra" value="Bluetooth"> Bluetooth</label>
    <label><input type="checkbox" class="extra" value="GPS"> GPS</label>
    <label><input type="checkbox" class="extra" value="Caméra"> Caméra</label>

    <button onclick="addCar()">Ajouter</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* 🔥 REMPLACE ICI PAR TON CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "motoaFree.firebaseapp.com",
  projectId: "motoaFree",
  storageBucket: "motoaFree.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ADD CAR ================= */
window.addCar = async function () {

    console.log("👉 addCar exécuté");

    try {

        let extras = [];
        document.querySelectorAll(".extra:checked").forEach(e => {
            extras.push(e.value);
        });

        let data = {
            marque: document.getElementById("marque").value,
            modele: document.getElementById("modele").value,
            prix: document.getElementById("prix").value,
            image: document.getElementById("image").value || "https://picsum.photos/250/150",
            annee: document.getElementById("annee").value,
            km: document.getElementById("km").value,
            ville: document.getElementById("ville").value,
            options: {
                transmission: document.getElementById("transmission").value,
                carburant: document.getElementById("carburant").value,
                carrosserie: document.getElementById("carrosserie").value,
                couleur: document.getElementById("couleur").value,
                sieges: document.getElementById("sieges").value,
                extras: extras
            }
        };

        console.log("DATA:", data);
        console.log("Avant addDoc");

        const result = await addDoc(collection(db, "cars"), data);

        console.log("✅ Ajout OK ID:", result.id);

        alert("Voiture ajoutée avec succès 🚗");

        clearForm();
        loadCars();

    } catch (e) {
        console.error("❌ ERREUR FIREBASE:", e);
    }
};

/* ================= LOAD ================= */
window.loadCars = async function () {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    console.log("Cars reçues:", snapshot.size);

    snapshot.forEach((doc) => {

        let car = doc.data();

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <img src="${car.image}">
            <p><b>${car.marque} ${car.modele}</b></p>
            <p>💰 ${car.prix} FCFA</p>
            <p>📍 ${car.ville || "N/A"} • ${car.annee || "?"}</p>
            <p>
              ⚙️ ${car.options?.transmission || "N/A"} • 
              ⛽ ${car.options?.carburant || "N/A"}
            </p>
            <p>
              🚗 ${car.options?.carrosserie || "N/A"} • 
              🎨 ${car.options?.couleur || "N/A"} • 
              🪑 ${car.options?.sieges || "N/A"}
            </p>
        `;

        container.appendChild(div);
    });
};

/* ================= CLEAR FORM ================= */
function clearForm() {

    document.getElementById("marque").value = "";
    document.getElementById("modele").value = "";
    document.getElementById("prix").value = "";
    document.getElementById("image").value = "";
    document.getElementById("annee").value = "";
    document.getElementById("km").value = "";
    document.getElementById("ville").value = "";

    document.getElementById("transmission").selectedIndex = 0;
    document.getElementById("carburant").selectedIndex = 0;
    document.getElementById("carrosserie").selectedIndex = 0;
    document.getElementById("couleur").selectedIndex = 0;
    document.getElementById("sieges").selectedIndex = 0;

    document.querySelectorAll(".extra").forEach(e => e.checked = false);
}

/* ================= INIT ================= */
window.onload = function () {
    loadCars();
};

</script>

</body>
</html>

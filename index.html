<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoa - Marketplace Auto</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 6px;
        }

        .car {
            background: white;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p id="userInfo">Chargement...</p>
</header>

<div class="container">

    <button onclick="goLogin()">Se connecter</button>
    <button onclick="logout()">Se déconnecter</button>

    <h2>Voitures disponibles</h2>
    <div id="carList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH
onAuthStateChanged(auth, async (user) => {

    if (user) {

        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        let role = "unknown";
        if (docSnap.exists()) role = docSnap.data().role;

        document.getElementById("userInfo").innerText =
            "Connecté : " + user.email + " (" + role + ")";

        // redirection vendeur
        if (role === "seller") {
            window.location.href = "seller.html";
            return;
        }

    } else {
        document.getElementById("userInfo").innerText = "Non connecté";
    }

    loadCars();
});

// LOAD
async function loadCars() {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    snapshot.forEach((docItem) => {
        let car = docItem.data();

        let div = document.createElement("div");
        div.innerHTML = `
            <p><b>${car.marque} ${car.modele}</b> - ${car.prix}</p>
            <hr>
        `;
        container.appendChild(div);
    });
}

// NAV
window.goLogin = () => window.location.href = "login.html";
window.logout = () => signOut(auth);
    
</script>

</body>
</html>

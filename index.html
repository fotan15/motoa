<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>

        body{
            font-family:Arial;
            background:#f0f2f5;
            margin:0;
        }

        header{
            background:#007BFF;
            color:white;
            text-align:center;
            padding:15px;
            position:sticky;
            top:0;
            z-index:100;
        }

        .container{
            width:95%;
            margin:auto;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:5px 0;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin:5px 0;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .logoutBtn{
            background:black;
        }

        .favoriteBtn{
            background:#ff4081;
        }

        .car{
            background:white;
            margin:15px 0;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .car img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .car p{
            margin:8px;
            font-size:16px;
        }

        .sectionTitle{
            margin-top:25px;
        }

        #favoritesSection{
            margin-top:30px;
        }

    </style>
</head>

<body>

<header>

    <h1>Motoa</h1>
    <p>La voiture facile en Afrique</p>

    <p id="userInfo">Chargement...</p>

    <button id="loginBtn" onclick="goLogin()">Connexion</button>
    <button id="logoutBtn" class="logoutBtn" onclick="logout()">Déconnexion</button>

</header>

<div class="container">

    <h2 class="sectionTitle">🚗 Voitures disponibles</h2>

    <input id="search" placeholder="🔍 Rechercher (Toyota, BMW...)">
    <input id="maxPrice" placeholder="💰 Prix max">

    <button onclick="filterCars()">Filtrer</button>
    <button onclick="resetFilter()">Reset</button>

    <div id="carList"></div>

    <!-- FAVORIS -->
    <div id="favoritesSection" style="display:none">

        <h2>❤️ Mes favoris</h2>

        <div id="favoritesList"></div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    query,
    where,
    deleteDoc,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// ================= FIREBASE =================

const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let currentRole = null;

// ================= AUTH =================

onAuthStateChanged(auth, async(user)=>{

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    currentUser = user;

    if(!user){

        currentRole = null;

        document.getElementById("userInfo").innerText = "Non connecté";

        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";

        document.getElementById("favoritesSection").style.display = "none";

        loadCars();

        return;
    }

    // récupérer rôle
    const userDoc = await getDoc(doc(db,"users",user.uid));

    if(userDoc.exists()){
        currentRole = userDoc.data().role;
    }

    document.getElementById("userInfo").innerText =
        "Connecté : " + user.email + " (" + currentRole + ")";

    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";

    // vendeur -> seller.html
    if(currentRole === "seller"){
        window.location.href = "seller.html";
        return;
    }

    // acheteur
    document.getElementById("favoritesSection").style.display = "block";

    loadCars();
    loadFavorites();

});

// ================= LOAD CARS =================

window.loadCars = async function(filtered = null){

    const container = document.getElementById("carList");

    container.innerHTML = "";

    let cars = [];

    // si filtré
    if(filtered){
        cars = filtered;
    }else{

        const snapshot = await getDocs(collection(db,"cars"));

        snapshot.forEach((docItem)=>{

            cars.push({
                id:docItem.id,
                ...docItem.data()
            });

        });
    }

    // aucune voiture
    if(cars.length === 0){

        container.innerHTML = "<p>Aucune voiture trouvée.</p>";
        return;
    }

    // affichage
    for(const car of cars){

        let favoriteText = "🤍 Favori";

        if(currentUser){

            const favQuery = query(
                collection(db,"favorites"),
                where("userId","==",currentUser.uid),
                where("carId","==",car.id)
            );

            const favSnapshot = await getDocs(favQuery);

            if(!favSnapshot.empty){
                favoriteText = "❤️ Retirer";
            }
        }

        const div = document.createElement("div");

        div.className = "car";

        div.innerHTML = `

            <img src="${car.image || 'https://picsum.photos/500/300'}">

            <p><b>${car.marque} ${car.modele}</b></p>

            <p>💰 ${car.prix} FCFA</p>

            <p>📍 ${car.ville || "Ville inconnue"}</p>

            <p>📅 ${car.annee || "N/A"} | ⛽ ${car.carburant || "N/A"}</p>

            ${
                currentUser && currentRole === "buyer"
                ?
                `<button class="favoriteBtn" onclick="toggleFavorite('${car.id}')">
                    ${favoriteText}
                </button>`
                :
                ""
            }

        `;

        container.appendChild(div);
    }
};

// ================= FAVORIS =================

window.toggleFavorite = async function(carId){

    if(!currentUser){
        alert("Connecte-toi d'abord !");
        return;
    }

    const q = query(
        collection(db,"favorites"),
        where("userId","==",currentUser.uid),
        where("carId","==",carId)
    );

    const snapshot = await getDocs(q);

    // déjà favori
    if(!snapshot.empty){

        snapshot.forEach(async(docItem)=>{

            await deleteDoc(doc(db,"favorites",docItem.id));

        });

    }else{

        await addDoc(collection(db,"favorites"),{
            userId:currentUser.uid,
            carId:carId
        });

    }

    loadCars();
    loadFavorites();
};

// ================= LOAD FAVORITES =================

async function loadFavorites(){

    if(!currentUser) return;

    const container = document.getElementById("favoritesList");

    container.innerHTML = "";

    const favQuery = query(
        collection(db,"favorites"),
        where("userId","==",currentUser.uid)
    );

    const favSnapshot = await getDocs(favQuery);

    if(favSnapshot.empty){

        container.innerHTML = "<p>Aucun favori.</p>";
        return;
    }

    for(const favDoc of favSnapshot.docs){

        const fav = favDoc.data();

        const carDoc = await getDoc(doc(db,"cars",fav.carId));

        if(!carDoc.exists()) continue;

        const car = carDoc.data();

        const div = document.createElement("div");

        div.className = "car";

        div.innerHTML = `

            <img src="${car.image || 'https://picsum.photos/500/300'}">

            <p><b>${car.marque} ${car.modele}</b></p>

            <p>💰 ${car.prix} FCFA</p>

        `;

        container.appendChild(div);
    }
}

// ================= FILTRE =================

window.filterCars = async function(){

    const search = document.getElementById("search").value.toLowerCase();

    const maxPrice = document.getElementById("maxPrice").value;

    const snapshot = await getDocs(collection(db,"cars"));

    let filtered = [];

    snapshot.forEach((docItem)=>{

        const car = {
            id:docItem.id,
            ...docItem.data()
        };

        let ok = true;

        if(search){

            const full =
                (car.marque + " " + car.modele).toLowerCase();

            if(!full.includes(search)){
                ok = false;
            }
        }

        if(maxPrice){

            if(Number(car.prix) > Number(maxPrice)){
                ok = false;
            }
        }

        if(ok){
            filtered.push(car);
        }

    });

    loadCars(filtered);
};

// ================= RESET =================

window.resetFilter = function(){

    document.getElementById("search").value = "";
    document.getElementById("maxPrice").value = "";

    loadCars();
};

// ================= NAV =================

window.goLogin = function(){
    window.location.href = "login.html";
};

window.logout = function(){
    signOut(auth);
};

</script>

</body>
</html>

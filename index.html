<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoa - Marketplace Auto</title>

    <style>

        body{
            font-family: Arial;
            background:#f0f2f5;
            margin:0;
        }

        header{
            background:#007BFF;
            color:white;
            text-align:center;
            padding:15px;
            position:sticky;
            top:0;
            z-index:100;
        }

        .container{
            width:95%;
            margin:auto;
            padding-bottom:50px;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:5px 0;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin:5px 0;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .logoutBtn{
            background:black;
        }

        .favoriteBtn{
            background:#ff4081;
        }

        .car{
            background:white;
            margin:15px 0;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .car img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .carContent{
            padding:10px;
        }

        .car p{
            margin:6px 0;
        }

        h2{
            margin-top:25px;
        }

    </style>
</head>

<body>

<header>

    <h1>Motoa</h1>
    <p>La voiture facile en Afrique</p>

    <p id="userInfo">Chargement...</p>

    <button id="loginBtn" onclick="goLogin()">
        Connexion
    </button>

    <button id="logoutBtn" class="logoutBtn" onclick="logout()">
        Déconnexion
    </button>

</header>

<div class="container">

    <h2>🚗 Voitures</h2>

    <input id="search" placeholder="🔍 Rechercher (Toyota, BMW...)">

    <input id="maxPrice" placeholder="💰 Prix max">

    <button onclick="filterCars()">
        Filtrer
    </button>

    <button onclick="resetFilter()">
        Reset
    </button>

    <div id="carList"></div>

    <!-- FAVORIS -->
    <div id="favoriteSection" style="display:none">

        <h2>❤️ Mes favoris</h2>

        <div id="favoriteList"></div>

    </div>

</div>

<script type="module">

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    query,
    where,
    deleteDoc,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let currentUser = null;
let currentRole = null;

let allCars = [];

// AUTH
onAuthStateChanged(auth, async(user)=>{

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    currentUser = user;

    if(!user){

        currentRole = null;

        document.getElementById("userInfo").innerText =
            "Non connecté";

        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";

        document.getElementById("favoriteSection").style.display = "none";

        await loadCars();

        return;
    }

    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";

    // ROLE
    const userDoc = await getDoc(doc(db,"users",user.uid));

    if(userDoc.exists()){
        currentRole = userDoc.data().role;
    }

    document.getElementById("userInfo").innerText =
        "Connecté : " + user.email + " (" + currentRole + ")";

    // vendeur => seller
    if(currentRole === "seller"){
        window.location.href = "seller.html";
        return;
    }

    document.getElementById("favoriteSection").style.display = "block";

    await loadCars();

    await loadFavorites();

});

// LOAD CARS
async function loadCars(){

    const snapshot = await getDocs(collection(db,"cars"));

    allCars = [];

    snapshot.forEach((docItem)=>{

        allCars.push({
            id: docItem.id,
            ...docItem.data()
        });

    });

    renderCars(allCars);

}

// RENDER
async function renderCars(cars){

    const container = document.getElementById("carList");

    container.innerHTML = "";

    if(cars.length === 0){

        container.innerHTML = "<p>Aucune voiture trouvée</p>";

        return;
    }

    for(const car of cars){

        let fav = false;

        if(currentUser){

            fav = await isFavorite(car.id);

        }

        const div = document.createElement("div");

        div.className = "car";

        div.innerHTML = `

            <img src="${car.image || 'https://picsum.photos/400/200'}">

            <div class="carContent">

                <p>
                    <b>${car.marque || ""} ${car.modele || ""}</b>
                </p>

                <p>
                    💰 ${car.prix || ""} FCFA
                </p>

                <p>
                    📍 ${car.ville || ""}
                </p>

                <p>
                    📅 ${car.annee || ""}
                </p>

                <p>
                    ⚙️ ${car.options?.transmission || ""}
                </p>

                ${
                    currentUser
                    ?
                    `
                    <button 
                        class="favoriteBtn"
                        onclick="toggleFavorite('${car.id}')"
                    >
                        ${fav ? "❤️ Retirer des favoris" : "🤍 Ajouter aux favoris"}
                    </button>
                    `
                    :
                    ""
                }

            </div>

        `;

        container.appendChild(div);

    }

}

// FAVORI CHECK
async function isFavorite(carId){

    if(!currentUser) return false;

    const q = query(
        collection(db,"favorites"),
        where("userId","==",currentUser.uid),
        where("carId","==",carId)
    );

    const snapshot = await getDocs(q);

    return !snapshot.empty;

}

// FAVORI TOGGLE
window.toggleFavorite = async function(carId){

    if(!currentUser){

        alert("Connecte-toi d'abord");

        return;
    }

    const q = query(
        collection(db,"favorites"),
        where("userId","==",currentUser.uid),
        where("carId","==",carId)
    );

    const snapshot = await getDocs(q);

    if(!snapshot.empty){

        snapshot.forEach(async(docItem)=>{

            await deleteDoc(doc(db,"favorites",docItem.id));

        });

    }else{

        await addDoc(collection(db,"favorites"),{

            userId: currentUser.uid,
            carId: carId

        });

    }

    await loadCars();

    await loadFavorites();

};

// LOAD FAVORITES
async function loadFavorites(){

    if(!currentUser) return;

    const container = document.getElementById("favoriteList");

    container.innerHTML = "";

    const q = query(
        collection(db,"favorites"),
        where("userId","==",currentUser.uid)
    );

    const snapshot = await getDocs(q);

    if(snapshot.empty){

        container.innerHTML = "<p>Aucun favori</p>";

        return;
    }

    for(const favDoc of snapshot.docs){

        const fav = favDoc.data();

        const car = allCars.find(c=>c.id === fav.carId);

        if(!car) continue;

        const div = document.createElement("div");

        div.className = "car";

        div.innerHTML = `

            <img src="${car.image || 'https://picsum.photos/400/200'}">

            <div class="carContent">

                <p>
                    <b>${car.marque} ${car.modele}</b>
                </p>

                <p>
                    💰 ${car.prix} FCFA
                </p>

            </div>

        `;

        container.appendChild(div);

    }

}

// FILTER
window.filterCars = function(){

    const search = document
        .getElementById("search")
        .value
        .toLowerCase();

    const maxPrice = document
        .getElementById("maxPrice")
        .value;

    const filtered = allCars.filter(car=>{

        const full =
            (car.marque || "") + " " +
            (car.modele || "");

        const matchSearch =
            full.toLowerCase().includes(search);

        const matchPrice =
            !maxPrice ||
            parseInt(car.prix || 0) <= parseInt(maxPrice);

        return matchSearch && matchPrice;

    });

    renderCars(filtered);

};

// RESET
window.resetFilter = function(){

    document.getElementById("search").value = "";
    document.getElementById("maxPrice").value = "";

    renderCars(allCars);

};

// NAV
window.goLogin = function(){

    window.location.href = "login.html";

};

window.logout = function(){

    signOut(auth);

};

</script>

</body>
</html>

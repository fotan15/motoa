<!DOCTYPE html>
<html>
<head>
    <title>Motoa</title>
</head>

<body>

<h1>🚗 Motoa</h1>

<p id="userInfo">Non connecté</p>

<button onclick="goLogin()">Se connecter</button>
<button onclick="logout()">Se déconnecter</button>

<h2>Voitures disponibles</h2>

<div id="carList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ======================
// AUTH CHECK
// ======================
onAuthStateChanged(auth, async (user) => {

    if (user) {

        console.log("Utilisateur connecté:", user.email);

        // 🔍 récupérer rôle
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        let role = "unknown";

        if (docSnap.exists()) {
            role = docSnap.data().role;
        }

        // 👤 afficher utilisateur
        document.getElementById("userInfo").innerText =
            "Connecté : " + user.email + " (" + role + ")";

        // 🔥 REDIRECTION VENDEUR
        if (role === "seller") {
            window.location.href = "seller.html";
            return;
        }

        loadCars();

    } else {

        document.getElementById("userInfo").innerText = "Non connecté";
        loadCars();
    }
});

// ======================
// LOAD CARS
// ======================
async function loadCars() {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    snapshot.forEach((docItem) => {

        let car = docItem.data();

        let div = document.createElement("div");

        div.innerHTML = `
            <p>
                <b>${car.marque} ${car.modele}</b> - ${car.prix} FCFA
            </p>
            <hr>
        `;

        container.appendChild(div);
    });
}

// ======================
// NAVIGATION
// ======================
window.goLogin = function () {
    window.location.href = "login.html";
};

window.logout = function () {
    signOut(auth);
};

</script>

</body>
</html>

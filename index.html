<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            text-align: center;
            padding: 15px;
            position: sticky;
            top: 0;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .car {
            background: white;
            margin: 10px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 10px;
        }

        .btn-danger {
            background: red;
        }
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>Marketplace Auto</p>
</header>

<div class="container">

    <h2>🔐 Connexion</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="register()">Créer compte</button>
    <button onclick="login()">Connexion</button>

    <p id="userStatus">Non connecté</p>

    <hr>

    <h2>🚗 Ajouter une voiture</h2>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">
    <input id="image" placeholder="Image URL">

    <select id="transmission">
        <option>Manuelle</option>
        <option>Automatique</option>
    </select>

    <select id="carburant">
        <option>Essence</option>
        <option>Diesel</option>
        <option>Électrique</option>
    </select>

    <button onclick="addCar()">Ajouter</button>

    <hr>

    <h2>🚘 Voitures disponibles</h2>

    <div id="carList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { 
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

/* ================= AUTH ================= */

window.register = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        const user = await createUserWithEmailAndPassword(auth, email, password);
        alert("Compte créé ✅");
        currentUser = user.user;
    } catch (e) {
        alert(e.message);
    }
};

window.login = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        const user = await signInWithEmailAndPassword(auth, email, password);
        alert("Connecté ✅");
        currentUser = user.user;
    } catch (e) {
        alert(e.message);
    }
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        document.getElementById("userStatus").innerText = "Connecté : " + user.email;
    } else {
        currentUser = null;
        document.getElementById("userStatus").innerText = "Non connecté";
    }
});

/* ================= ADD CAR ================= */

window.addCar = async function () {

    if (!currentUser) {
        alert("Tu dois être connecté ❌");
        return;
    }

    let marque = document.getElementById("marque").value;
    let modele = document.getElementById("modele").value;
    let prix = document.getElementById("prix").value;
    let image = document.getElementById("image").value;

    if (!image) image = "https://picsum.photos/250/150";

    await addDoc(collection(db, "cars"), {
        marque,
        modele,
        prix,
        image,
        userId: currentUser.uid
    });

    alert("Voiture ajoutée 🚗");

    document.getElementById("marque").value = "";
    document.getElementById("modele").value = "";
    document.getElementById("prix").value = "";
    document.getElementById("image").value = "";

    loadCars();
};

/* ================= LOAD CARS ================= */

window.loadCars = async function () {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    let count = 0;

    snapshot.forEach((doc) => {

        let car = doc.data();
        count++;

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <img src="${car.image}" width="100%">
            <h3>${car.marque} ${car.modele}</h3>
            <p>💰 ${car.prix} FCFA</p>
        `;

        container.appendChild(div);
    });

    console.log("Cars reçues:", count);
};

window.onload = loadCars;

</script>

</body>
</html>

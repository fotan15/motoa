<!DOCTYPE html>
<html>
<head>
  <title>Motoa - Marketplace Auto</title>

  <style>
    body { font-family: Arial; background:#f0f2f5; margin:0; }
    header { background:#007BFF; color:white; text-align:center; padding:15px; }
    .container { width:95%; margin:auto; }

    input, select {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:10px;
      margin:5px 0;
      background:#007BFF;
      color:white;
      border:none;
      border-radius:8px;
    }

    .car {
      background:white;
      margin:10px 0;
      border-radius:10px;
      padding:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .car img {
      width:100%;
      height:180px;
      object-fit:cover;
    }
  </style>
</head>

<body>

<header>
  <h1>Motoa</h1>
  <p>Achat & Vente de voitures</p>
</header>

<div class="container">

  <h2>🔍 Filtre PRO</h2>

  <input id="search" placeholder="Marque ou modèle">
  <input id="maxPrice" placeholder="Prix max">

  <select id="filterTransmission">
    <option value="">Transmission (Tous)</option>
    <option>Manuelle</option>
    <option>Automatique</option>
    <option>Semi-automatique</option>
  </select>

  <select id="filterCarburant">
    <option value="">Carburant (Tous)</option>
    <option>Essence</option>
    <option>Diesel</option>
    <option>Électrique</option>
  </select>

  <select id="filterCarrosserie">
    <option value="">Carrosserie (Toutes)</option>
    <option>Berline</option>
    <option>SUV</option>
    <option>Citadine</option>
    <option>Coupé</option>
    <option>Pickup</option>
  </select>

  <select id="filterCouleur">
    <option value="">Couleur (Toutes)</option>
    <option>Noir</option>
    <option>Blanc</option>
    <option>Gris</option>
    <option>Bleu</option>
    <option>Rouge</option>
  </select>

  <button onclick="filterCars()">Filtrer</button>
  <button onclick="loadCars()">Reset</button>

  <h2>📤 Ajouter une voiture</h2>

  <input id="marque" placeholder="Marque">
  <input id="modele" placeholder="Modèle">
  <input id="prix" placeholder="Prix">
  <input id="image" placeholder="Image URL">
  <input id="annee" placeholder="Année">
  <input id="km" placeholder="Kilométrage">
  <input id="ville" placeholder="Ville">

  <select id="transmission">
    <option>Manuelle</option>
    <option>Automatique</option>
    <option>Semi-automatique</option>
  </select>

  <select id="carburant">
    <option>Essence</option>
    <option>Diesel</option>
    <option>Électrique</option>
  </select>

  <select id="carrosserie">
    <option>Berline</option>
    <option>SUV</option>
    <option>Citadine</option>
    <option>Coupé</option>
    <option>Pickup</option>
  </select>

  <select id="couleur">
    <option>Noir</option>
    <option>Blanc</option>
    <option>Gris</option>
    <option>Bleu</option>
    <option>Rouge</option>
  </select>

  <select id="sieges">
    <option>2</option>
    <option>4</option>
    <option>5</option>
    <option>7</option>
  </select>

  <label><input type="checkbox" value="ABS" class="extra"> ABS</label>
  <label><input type="checkbox" value="Bluetooth" class="extra"> Bluetooth</label>
  <label><input type="checkbox" value="GPS" class="extra"> GPS</label>

  <button onclick="addCar()">Ajouter</button>

  <h2>🚗 Voitures</h2>
  <div id="carList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
  authDomain: "motoafree.firebaseapp.com",
  projectId: "motoafree",
  storageBucket: "motoafree.firebasestorage.app",
  messagingSenderId: "727661050460",
  appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allCars = [];

// ADD
window.addCar = async function () {

  let extras = [];
  document.querySelectorAll(".extra:checked").forEach(e => extras.push(e.value));

  let data = {
    marque: marque.value,
    modele: modele.value,
    prix: prix.value,
    image: image.value || "https://picsum.photos/250/150",
    annee: annee.value,
    km: km.value,
    ville: ville.value,
    options: {
      transmission: transmission.value,
      carburant: carburant.value,
      carrosserie: carrosserie.value,
      couleur: couleur.value,
      sieges: sieges.value,
      extras
    }
  };

  await addDoc(collection(db, "cars"), data);

  alert("Voiture ajoutée 🚗");

  // RESET
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll("select").forEach(s => s.selectedIndex = 0);
  document.querySelectorAll(".extra").forEach(e => e.checked = false);

  loadCars();
};

// LOAD
window.loadCars = async function () {

  let container = document.getElementById("carList");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db, "cars"));

  allCars = [];

  snapshot.forEach(doc => {
    let car = doc.data();
    car.id = doc.id;
    allCars.push(car);
  });

  renderCars(allCars);
};

// RENDER
function renderCars(list) {

  let container = document.getElementById("carList");
  container.innerHTML = "";

  list.forEach(car => {

    let div = document.createElement("div");
    div.className = "car";

    div.innerHTML = `
      <img src="${car.image}">
      <h3>${car.marque} ${car.modele}</h3>
      <p>💰 ${car.prix} FCFA</p>
      <p>📍 ${car.ville || "-"} • ${car.annee || "-"}</p>
      <p>⚙️ ${car.options?.transmission} • ⛽ ${car.options?.carburant}</p>

      <button onclick="toggleDetails('${car.id}')">Voir détails</button>

      <div id="d-${car.id}" style="display:none">
        <p>🚗 ${car.options?.carrosserie}</p>
        <p>🎨 ${car.options?.couleur}</p>
        <p>🪑 ${car.options?.sieges}</p>
        <p>⭐ ${(car.options?.extras || []).join(", ")}</p>
      </div>
    `;

    container.appendChild(div);
  });
}

// FILTER PRO
window.filterCars = function () {

  let searchVal = search.value.toLowerCase();
  let max = parseInt(maxPrice.value);

  let result = allCars.filter(car => {

    let matchSearch = (car.marque + car.modele).toLowerCase().includes(searchVal);

    let matchPrice = !max || parseInt(car.prix) <= max;

    let matchTrans = !filterTransmission.value || car.options?.transmission === filterTransmission.value;
    let matchCarb = !filterCarburant.value || car.options?.carburant === filterCarburant.value;
    let matchCarros = !filterCarrosserie.value || car.options?.carrosserie === filterCarrosserie.value;
    let matchCouleur = !filterCouleur.value || car.options?.couleur === filterCouleur.value;

    return matchSearch && matchPrice && matchTrans && matchCarb && matchCarros && matchCouleur;
  });

  renderCars(result);
};

// DETAILS
window.toggleDetails = function(id) {
  let el = document.getElementById("d-" + id);
  el.style.display = el.style.display === "none" ? "block" : "none";
};

// INIT
window.onload = loadCars;

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
       
		body {
			font-family: Arial;
			background: #f0f2f5;
			margin: 0;
		}

		header {
			background: #007BFF;
			color: white;
			text-align: center;
			padding: 15px;
			position: sticky;
			top: 0;
		}

		.container {
			width: 95%;
			margin: auto;
		}

		/* 🔍 recherche */
		input {
			width: 100%;
			padding: 12px;
			margin: 5px 0;
			border-radius: 8px;
			border: 1px solid #ccc;
		}

		/* boutons */
		button {
			width: 100%;
			padding: 12px;
			margin: 5px 0;
			background: #007BFF;
			color: white;
			border: none;
			border-radius: 8px;
			font-size: 16px;
		}

		.btn-danger {
			background: red;
		}

		/* carte voiture */
		.car {
			background: white;
			margin: 10px 0;
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 2px 5px rgba(0,0,0,0.1);
		}

		.car img {
			width: 100%;
			height: 180px;
			object-fit: cover;
		}

		.car p {
			margin: 8px;
			font-size: 16px;
		}

		.car a {
			display: block;
			margin: 8px;
			padding: 10px;
			background: #25D366;
			color: white;
			text-align: center;
			border-radius: 8px;
			text-decoration: none;
		}


    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>La voiture facile en Afrique</p>
</header>

	<div class="container">

		<h2>🚗 Voitures</h2>
		<input id="search" placeholder="🔍 Rechercher (Toyota, BMW...)">

		<input id="maxPrice" placeholder="💰 Prix max">
		
		
		<select id="filterTransmission">
			<option value="">Transmission (Tous)</option>
			<option value="Manuelle">Manuelle</option>
			<option value="Automatique">Automatique</option>
			<option value="Semi-automatique">Semi-automatique</option>
		</select>
		
		<select id="filterCarburant">
			<option value="">Carburant (Tous)</option>
			<option>Essence</option>
			<option>Diesel</option>
			<option>Électrique</option>
		</select>
		
		<select id="filterCarrosserie">
			<option value="">Carrosserie (Toutes)</option>
			<option>Berline</option>
			<option>SUV</option>
			<option>Citadine</option>
			<option>Coupé</option>
			<option>Pickup</option>
		</select>
		
		<select id="filterCouleur">
			<option value="">Couleur (Toutes)</option>
			<option>Noir</option>
			<option>Blanc</option>
			<option>Gris</option>
			<option>Bleu</option>
			<option>Rouge</option>
		</select>
		
		
		

		<button onclick="filterCars()">Filtrer</button>
		<button onclick="resetFilter()">Reset</button>

		<div id="carList"></div>

		<h2>📤 Ajouter une voiture</h2>

		<input id="marque" placeholder="Marque">
		<input id="modele" placeholder="Modèle">
		<input id="prix" placeholder="Prix">
		<input id="image" placeholder="Image URL">
		<input id="annee" placeholder="Année (ex: 2018)">
		<input id="km" placeholder="Kilométrage (ex: 120000)">
		<input id="ville" placeholder="Ville (Douala, Yaoundé...)">

		<select id="carburant">
			<option value="Essence">Essence</option>
			<option value="Diesel">Diesel</option>
		</select>

		<select id="transmission">
			<option value="Manuelle">Manuelle</option>
			<option value="Automatique">Automatique</option>
			<option value="Semi-automatique">Semi-automatique</option>
		</select>
		<select id="carburant">
			<option>Essence</option>
			<option>Diesel</option>
			<option>Électrique</option>
		</select>
		<select id="carrosserie">
			<option>Berline</option>
			<option>SUV</option>
			<option>Citadine</option>
			<option>Coupé</option>
			<option>Pickup</option>
		</select>
		<select id="couleur">
			<option>Noir</option>
			<option>Blanc</option>
			<option>Gris</option>
			<option>Bleu</option>
			<option>Rouge</option>
		</select>
		<select id="Nombre de sieges">
			<option>2</option>
			<option>4</option>
			<option>5</option>
			<option>7</option>
		</select>
		<label><input type="checkbox" value="ABS" class="extra"> ABS</label>
		<label><input type="checkbox" value="Bluetooth" class="extra"> Bluetooth</label>
		<label><input type="checkbox" value="GPS" class="extra"> GPS</label>
		<label><input type="checkbox" value="Caméra" class="extra"> Caméra</label>

		<button onclick="addCar()">Ajouter</button>

	</div>
		
	<script>

		// =====================
		// 📦 DATA (données)
		// =====================
		//let cars = JSON.parse(localStorage.getItem("cars")) || [];

		// =====================
		// 🖥️ UI (affichage)
		// =====================
		function renderCars() {

			let container = document.getElementById("carList");
			container.innerHTML = "";

			cars.forEach((car, index) => {

				let div = document.createElement("div");
				div.className = "car";

				div.innerHTML = `
					<img src="${car.image}" onerror="this.src='https://picsum.photos/250/150'">

					<div style="padding:10px">

						<h3>${car.marque} ${car.modele}</h3>

						<p style="font-size:18px; font-weight:bold; color:#007BFF;">
							💰 ${car.prix} FCFA
						</p>

						<p style="font-size:14px; color:gray;">
							⚙️ ${car.options.transmission} • ⛽ ${car.options.carburant}
						</p>

						<button onclick="toggleDetails(${index})">
							🔽 Voir détails
						</button>

						<div id="details-${index}" style="display:none; margin-top:10px; font-size:14px;">

							<p>🚗 ${car.options.carrosserie}</p>
							<p>🎨 ${car.options.couleur}</p>
							<p>🪑 ${car.options.sieges} places</p>
							<p>⭐ ${car.options.extras.join(", ")}</p>

						</div>

						<a href="https://wa.me/237XXXXXXXXX?text=Je suis intéressé par ${car.marque} ${car.modele}">
							📲 Contacter sur WhatsApp
						</a>

						<button class="btn-danger" onclick="deleteCar(${index})">
							❌ Supprimer
						</button>

					</div>
				`;

				container.appendChild(div);
			});
		}

		// =====================
		// ⚙️ LOGIC (actions)
		// =====================
		
		async function addCar() {

			let marque = document.getElementById("marque").value;
			let modele = document.getElementById("modele").value;
			let prix = document.getElementById("prix").value;
			let image = document.getElementById("image").value;

			if (!marque || !modele || !prix) {
				alert("Remplis tous les champs");
				return;
			}

			if (!image) {
				image = "https://picsum.photos/250/150";
			}

			await addDoc(collection(db, "cars"), {
				marque,
				modele,
				prix,
				image,
				createdAt: Date.now()
			});

			loadCars();
		}

		// =====================
		// ❌ DELETE
		// =====================
		function deleteCar(index) {

			cars.splice(index, 1);

			saveData();
			renderCars();
		}

		// =====================
		// 💾 STORAGE
		// =====================
		//function saveData() {
		//	localStorage.setItem("cars", JSON.stringify(cars));
		//}

		// =====================
		// 🚀 INIT
		// =====================
		window.onload = function () {
				loadCars();
			};
			
		// =====================
		// 🚀 Filtrer
		// =====================
		function filterCars() {

			let search = document.getElementById("search").value.toLowerCase();
			let maxPrice = document.getElementById("maxPrice").value;

			let transmission = document.getElementById("filterTransmission").value;
			let carburant = document.getElementById("filterCarburant").value;
			let carrosserie = document.getElementById("filterCarrosserie").value;
			let couleur = document.getElementById("filterCouleur").value;

			let container = document.getElementById("carList");
			container.innerHTML = "";

			cars.forEach((car, index) => {

				let matchSearch = (car.marque + " " + car.modele).toLowerCase().includes(search);

				let matchPrice = !maxPrice || parseInt(car.prix) <= parseInt(maxPrice);

				let matchTransmission = !transmission || car.options.transmission === transmission;
				let matchCarburant = !carburant || car.options.carburant === carburant;
				let matchCarrosserie = !carrosserie || car.options.carrosserie === carrosserie;
				let matchCouleur = !couleur || car.options.couleur === couleur;

				if (matchSearch && matchPrice && matchTransmission && matchCarburant && matchCarrosserie && matchCouleur) {

					let div = document.createElement("div");
					div.className = "car";

					div.innerHTML = `
						<img src="${car.image}" width="100%" onerror="this.src='https://picsum.photos/250/150'">

						<p><b>${car.marque} ${car.modele}</b></p>
						<p>💰 ${car.prix} FCFA</p>

						<p>⚙️ ${car.options.transmission}</p>
						<p>⛽ ${car.options.carburant}</p>
						<p>🚗 ${car.options.carrosserie}</p>

						<a href="https://wa.me/237XXXXXXXXX?text=Je suis intéressé par ${car.marque} ${car.modele}">
							📲 WhatsApp
						</a>

						<br><br>

						<button onclick="deleteCar(${index})">❌ Supprimer</button>
					`;

					container.appendChild(div);
				}
			});
		}
		
		// =====================
		// 🚀 RESET Filtrer
		// =====================
		function resetFilter() {
			document.getElementById("search").value = "";
			document.getElementById("maxPrice").value = "";
			renderCars();
		}
		
		
		function toggleDetails(index) {

			let el = document.getElementById("details-" + index);

			if (el.style.display === "none") {
				el.style.display = "block";
			} else {
				el.style.display = "none";
			}
		}
		
		async function loadCars() {

			let container = document.getElementById("carList");
			container.innerHTML = "";

			const querySnapshot = await getDocs(collection(db, "cars"));

			querySnapshot.forEach((docItem) => {

				let car = docItem.data();

				let div = document.createElement("div");
				div.className = "car";

				div.innerHTML = `
					<img src="${car.image}" width="100%" onerror="this.src='https://picsum.photos/250/150'">

					<p><b>${car.marque} ${car.modele}</b></p>
					<p>💰 ${car.prix} FCFA</p>

					<a href="https://wa.me/237XXXXXXXXX?text=Je suis intéressé par ${car.marque} ${car.modele}">
						📲 WhatsApp
					</a>
				`;

				container.appendChild(div);
			});
		}
		
		<script type="module">

			import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

			import { 
			  getFirestore, 
			  collection, 
			  addDoc, 
			  getDocs, 
			  deleteDoc, 
			  doc 
			} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

			const firebaseConfig = {
			  apiKey: "AIzaSyAaUWm-yN_dOEDZEvaAqXCYPcp5ABWF_yY",
			  authDomain: "motoa-c01f7.firebaseapp.com",
			  projectId: "motoa-c01f7",
			  storageBucket: "motoa-c01f7.firebasestorage.app",
			  messagingSenderId: "303638072653",
			  appId: "1:303638072653:web:48122c011e9c7e0633bb04"
			};

			const app = initializeApp(firebaseConfig);
			const db = getFirestore(app);

	</script>

	</script>
	
	


</body>
</html>

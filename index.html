<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #007BFF;
            color: white;
            border: none;
        }

        .car {
            background: white;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }

        .btn-danger {
            background: red;
        }
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>Marketplace Auto</p>
</header>

<div class="container">

    <!-- LOGIN -->
    <h2>🔐 Connexion</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="register()">Créer compte</button>
    <button onclick="login()">Connexion</button>

    <p id="userStatus">Non connecté</p>

    <hr>

    <!-- ADD CAR -->
    <h2>🚗 Ajouter voiture</h2>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">
    <input id="image" placeholder="Image URL">

    <button onclick="addCar()">Ajouter</button>

    <hr>

    <!-- MARKETPLACE -->
    <h2>🚘 Voitures disponibles</h2>
    <div id="carList"></div>

    <hr>

    <!-- GARAGE -->
    <h2>🏪 Mon Garage</h2>
    <button onclick="loadGarage()">Afficher mon garage</button>
    <div id="garageList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

/* ================= AUTH ================= */

window.register = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await createUserWithEmailAndPassword(auth, email, password);
    alert("Compte créé ✅");
};

window.login = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);
    alert("Connecté ✅");
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        document.getElementById("userStatus").innerText = "Connecté : " + user.email;
    } else {
        currentUser = null;
        document.getElementById("userStatus").innerText = "Non connecté";
    }
});

/* ================= ADD CAR ================= */

window.addCar = async function () {

    if (!currentUser) {
        alert("Connecte-toi ❌");
        return;
    }

    let marque = document.getElementById("marque").value;
    let modele = document.getElementById("modele").value;
    let prix = document.getElementById("prix").value;
    let image = document.getElementById("image").value;

    if (!image) image = "https://picsum.photos/250/150";

    await addDoc(collection(db, "cars"), {
        marque,
        modele,
        prix,
        image,
        userId: currentUser.uid
    });

    alert("Voiture ajoutée 🚗");

    document.getElementById("marque").value = "";
    document.getElementById("modele").value = "";
    document.getElementById("prix").value = "";
    document.getElementById("image").value = "";

    loadCars();
};

/* ================= LOAD MARKET ================= */

window.loadCars = async function () {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    snapshot.forEach((docItem) => {

        let car = docItem.data();

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <img src="${car.image}" width="100%">
            <h3>${car.marque} ${car.modele}</h3>
            <p>${car.prix} FCFA</p>
        `;

        container.appendChild(div);
    });
};

/* ================= GARAGE ================= */

window.loadGarage = async function () {

    if (!currentUser) {
        alert("Connecte-toi ❌");
        return;
    }

    let container = document.getElementById("garageList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    snapshot.forEach((docItem) => {

        let car = docItem.data();

        if (car.userId !== currentUser.uid) return;

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <img src="${car.image}" width="100%">
            <h3>${car.marque} ${car.modele}</h3>
            <p>${car.prix} FCFA</p>

            <button class="btn-danger" onclick="deleteCar('${docItem.id}')">
                Supprimer
            </button>
        `;

        container.appendChild(div);
    });
};

/* ================= DELETE ================= */

window.deleteCar = async function (id) {
    await deleteDoc(doc(db, "cars", id));
    alert("Supprimé ❌");
    loadGarage();
};

/* INIT */
window.onload = loadCars;

</script>

</body>
</html>

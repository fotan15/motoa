<!DOCTYPE html>
<html>
<head>
  <title>Motoa - Marketplace Auto</title>

  <style>
    body { font-family: Arial; background:#f0f2f5; margin:0; }
    header { background:#007BFF; color:white; text-align:center; padding:15px; position:sticky; top:0; }
    .container { width:95%; margin:auto; }

    input, select {
      width:100%; padding:12px; margin:5px 0;
      border-radius:8px; border:1px solid #ccc;
    }

    button {
      width:100%; padding:12px; margin:5px 0;
      background:#007BFF; color:white;
      border:none; border-radius:8px;
    }

    .car {
      background:white; margin:10px 0;
      border-radius:12px; overflow:hidden;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
      padding:10px;
    }

    .car img { width:100%; height:180px; object-fit:cover; }
  </style>
</head>

<body>

<header>
  <h1>Motoa</h1>
  <p>Achat et vente de voitures</p>
</header>

<div class="container">

  <h2>Ajouter une voiture</h2>

  <input id="marque" placeholder="Marque">
  <input id="modele" placeholder="Modèle">
  <input id="prix" placeholder="Prix">
  <input id="image" placeholder="Image URL">

  <select id="transmission">
    <option>Manuelle</option>
    <option>Automatique</option>
    <option>Semi-automatique</option>
  </select>

  <button onclick="addCar()">Ajouter</button>

  <h2>Voitures</h2>
  <div id="carList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 Firebase config (TON PROJET motoaFree)
const firebaseConfig = {
  apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
  authDomain: "motoafree.firebaseapp.com",
  projectId: "motoafree",
  storageBucket: "motoafree.firebasestorage.app",
  messagingSenderId: "727661050460",
  appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =====================
// ADD CAR
// =====================
window.addCar = async function () {

  console.log("👉 addCar exécuté");

  try {

    const marque = document.getElementById("marque").value;
    const modele = document.getElementById("modele").value;
    const prix = document.getElementById("prix").value;
    let image = document.getElementById("image").value;

    if (!image) image = "https://picsum.photos/250/150";

    await addDoc(collection(db, "cars"), {
      marque,
      modele,
      prix,
      image,
      createdAt: Date.now()
    });

    // 🔥 IMPORTANT : reset champs
    document.getElementById("marque").value = "";
    document.getElementById("modele").value = "";
    document.getElementById("prix").value = "";
    document.getElementById("image").value = "";

    alert("Voiture ajoutée avec succès 🚗");

    loadCars();

  } catch (e) {
    console.error("ERREUR:", e);
  }
};

// =====================
// LOAD CARS
// =====================
window.loadCars = async function () {

  const container = document.getElementById("carList");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db, "cars"));

  console.log("Cars reçues:", snapshot.size);

  snapshot.forEach((doc) => {

    const car = doc.data();

    const div = document.createElement("div");
    div.className = "car";

    div.innerHTML = `
      <img src="${car.image}">
      <h3>${car.marque} ${car.modele}</h3>
      <p>💰 ${car.prix} FCFA</p>
    `;

    container.appendChild(div);
  });
};

// INIT
window.onload = function () {
  loadCars();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Motoa</title>

  <style>
    body { font-family: Arial; background:#f0f2f5; margin:0; }
    header { background:#007BFF; color:white; text-align:center; padding:15px; }
    .container { width:95%; margin:auto; }

    input, select {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:10px;
      margin:5px 0;
      background:#007BFF;
      color:white;
      border:none;
      border-radius:8px;
    }

    .car {
      background:white;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Motoa</h1>
</header>

<div class="container">

  <!-- AUTH -->
  <h2>🔐 Connexion / Inscription</h2>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Mot de passe" type="password">

  <select id="role">
    <option value="acheteur">Acheteur</option>
    <option value="vendeur">Vendeur</option>
  </select>

  <button onclick="register()">S'inscrire</button>
  <button onclick="login()">Se connecter</button>
  <button onclick="logout()">Se déconnecter</button>

  <h3 id="userInfo"></h3>

  <!-- ADD CAR -->
  <div id="addCarSection" style="display:none">

    <h2>Ajouter une voiture</h2>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">
    <input id="image" placeholder="Image URL">

    <button onclick="addCar()">Ajouter</button>

  </div>

  <!-- CARS -->
  <h2>Voitures</h2>
  <div id="carList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, setDoc, doc, getDoc }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
  authDomain: "motoafree.firebaseapp.com",
  projectId: "motoafree",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentRole = null;

// ================= REGISTER
window.register = async function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const userCredential = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", userCredential.user.uid), {
    email,
    role
  });

  alert("Compte créé !");
};

// ================= LOGIN
window.login = async function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);

  alert("Connecté !");
};

// ================= LOGOUT
window.logout = async function() {
  await signOut(auth);
  alert("Déconnecté !");
};

// ================= AUTH STATE
onAuthStateChanged(auth, async (user) => {

  if (user) {

    currentUser = user;

    const docSnap = await getDoc(doc(db, "users", user.uid));

    if (docSnap.exists()) {
      currentRole = docSnap.data().role;
    }

    document.getElementById("userInfo").innerText =
      "Connecté : " + user.email + " (" + currentRole + ")";

    // afficher ajout si vendeur
    if (currentRole === "vendeur") {
      document.getElementById("addCarSection").style.display = "block";
    } else {
      document.getElementById("addCarSection").style.display = "none";
    }

  } else {
    currentUser = null;
    currentRole = null;
    document.getElementById("userInfo").innerText = "Non connecté";
    document.getElementById("addCarSection").style.display = "none";
  }

  loadCars();
});

// ================= ADD CAR
window.addCar = async function() {

  if (!currentUser) {
    alert("Connecte-toi !");
    return;
  }

  await addDoc(collection(db, "cars"), {
    marque: marque.value,
    modele: modele.value,
    prix: prix.value,
    image: image.value || "https://picsum.photos/250/150",
    userId: currentUser.uid
  });

  alert("Voiture ajoutée");

  loadCars();
};

// ================= LOAD CARS
window.loadCars = async function() {

  let container = document.getElementById("carList");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db, "cars"));

  snapshot.forEach(doc => {

    let car = doc.data();

    let div = document.createElement("div");
    div.className = "car";

    div.innerHTML = `
      <img src="${car.image}" width="100%">
      <h3>${car.marque} ${car.modele}</h3>
      <p>${car.prix} FCFA</p>
    `;

    container.appendChild(div);
  });
};

</script>

</body>
</html>

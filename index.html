<!DOCTYPE html>
<html>
<head>
    <title>Motoa - Marketplace Auto</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            text-align: center;
            padding: 15px;
            position: sticky;
            top: 0;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .car {
            background: white;
            margin: 10px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .car img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .car p {
            margin: 8px;
        }
    </style>
</head>

<body>

<header>
    <h1>Motoa</h1>
    <p>La voiture facile en Afrique</p>
</header>

<div class="container">

    <h2>🚗 Voitures</h2>
    <div id="carList"></div>

    <h2>📤 Ajouter une voiture</h2>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">
    <input id="image" placeholder="Image URL">
    <input id="annee" placeholder="Année">
    <input id="km" placeholder="Kilométrage">
    <input id="ville" placeholder="Ville">

    <select id="transmission">
        <option>Manuelle</option>
        <option>Automatique</option>
        <option>Semi-automatique</option>
    </select>

    <select id="carburant">
        <option>Essence</option>
        <option>Diesel</option>
        <option>Électrique</option>
    </select>

    <select id="carrosserie">
        <option>Berline</option>
        <option>SUV</option>
        <option>Citadine</option>
        <option>Coupé</option>
        <option>Pickup</option>
    </select>

    <select id="couleur">
        <option>Noir</option>
        <option>Blanc</option>
        <option>Gris</option>
        <option>Bleu</option>
        <option>Rouge</option>
    </select>

    <select id="sieges">
        <option>2</option>
        <option>4</option>
        <option>5</option>
        <option>7</option>
    </select>

    <label><input type="checkbox" value="ABS" class="extra"> ABS</label>
    <label><input type="checkbox" value="Bluetooth" class="extra"> Bluetooth</label>
    <label><input type="checkbox" value="GPS" class="extra"> GPS</label>
    <label><input type="checkbox" value="Caméra" class="extra"> Caméra</label>

    <button onclick="addCar()">Ajouter</button>

</div>

<script type="module">

  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

// =====================
// ADD CAR
// =====================
window.addCar = async function () {

    console.log("👉 addCar exécuté");

    try {

        let marque = document.getElementById("marque").value || "";
        let modele = document.getElementById("modele").value || "";
        let prix = document.getElementById("prix").value || "";
        let image = document.getElementById("image").value || "";
        let annee = document.getElementById("annee").value || "";
        let km = document.getElementById("km").value || "";
        let ville = document.getElementById("ville").value || "";

        let transmission = document.getElementById("transmission").value;
        let carburant = document.getElementById("carburant").value;
        let carrosserie = document.getElementById("carrosserie").value;
        let couleur = document.getElementById("couleur").value;
        let sieges = document.getElementById("sieges").value;

        let extras = [];
        document.querySelectorAll(".extra:checked").forEach(e => {
            extras.push(e.value);
        });

        if (!image) {
            image = "https://picsum.photos/250/150";
        }

        let data = {
            marque,
            modele,
            prix,
            image,
            annee,
            km,
            ville,
            options: {
                transmission,
                carburant,
                carrosserie,
                couleur,
                sieges,
                extras
            }
        };

        console.log("DATA:", data);
        console.log("Avant addDoc");

        const result = await addDoc(collection(db, "cars"), data);

        console.log("✅ Ajout OK ID:", result.id);

        alert("Voiture ajoutée avec succès 🚗");

        await loadCars();

        // RESET FORM
        document.getElementById("marque").value = "";
        document.getElementById("modele").value = "";
        document.getElementById("prix").value = "";
        document.getElementById("image").value = "";
        document.getElementById("annee").value = "";
        document.getElementById("km").value = "";
        document.getElementById("ville").value = "";

        document.getElementById("transmission").selectedIndex = 0;
        document.getElementById("carburant").selectedIndex = 0;
        document.getElementById("carrosserie").selectedIndex = 0;
        document.getElementById("couleur").selectedIndex = 0;
        document.getElementById("sieges").selectedIndex = 0;

        document.querySelectorAll(".extra").forEach(e => e.checked = false);

    } catch (e) {
        console.error("❌ ERREUR:", e);
        alert("Erreur: " + e.message);
    }
};

// =====================
// LOAD CARS
// =====================
window.loadCars = async function () {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "cars"));

    console.log("Cars reçues:", snapshot.size);

    snapshot.forEach((doc) => {

        let car = doc.data();

        let options = car.options || {};

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <img src="${car.image}">
            <p><b>${car.marque} ${car.modele}</b></p>
            <p>💰 ${car.prix} FCFA</p>
            <p>📍 ${car.ville || "N/A"} • ${car.annee || "?"}</p>
            <p>⚙️ ${options.transmission || "-"} • ⛽ ${options.carburant || "-"}</p>
        `;

        container.appendChild(div);
    });
};

// =====================
// INIT
// =====================
window.onload = function () {
    loadCars();
};

</script>

</body>
</html>

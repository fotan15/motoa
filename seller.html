<!DOCTYPE html>
<html>
<head>
    <title>Garage vendeur - Motoa</title>
</head>

<body>

<h1>TEST SELLER V2</h1>
<h2>🚗 Mon garage</h2>

<p id="userInfo">Chargement...</p>

<button onclick="logout()">Se déconnecter</button>

<h3>Ajouter une voiture</h3>

<input id="marque" placeholder="Marque"><br><br>
<input id="modele" placeholder="Modèle"><br><br>
<input id="prix" placeholder="Prix"><br><br>

<button onclick="addCar()">Ajouter</button>

<h3>Mes voitures</h3>

<div id="carList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
    getAuth, 
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs,
    query,
    where,
    deleteDoc,
    doc,
    updateDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// ======================
// AUTH CHECK
// ======================
onAuthStateChanged(auth, async (user) => {

    console.log("Auth state:", user);

    if (!user) {
        alert("Non connecté !");
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    // afficher email
    document.getElementById("userInfo").innerText =
        "Connecté : " + user.email;

    console.log("Utilisateur connecté:", user.uid);

    loadCars();
});

// ======================
// ADD
// ======================
window.addCar = async function () {

    if (!currentUser) {
        alert("Utilisateur non prêt");
        return;
    }

    let marque = document.getElementById("marque").value;
    let modele = document.getElementById("modele").value;
    let prix = document.getElementById("prix").value;

    console.log("Ajout voiture avec UID:", currentUser.uid);

    await addDoc(collection(db, "cars"), {
        marque,
        modele,
        prix,
        userId: currentUser.uid
    });

    alert("Voiture ajoutée");

    loadCars();
};

// ======================
// LOAD
// ======================
async function loadCars() {

    console.log("Chargement voitures...");

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const q = query(
        collection(db, "cars"),
        where("userId", "==", currentUser.uid)
    );

    const snapshot = await getDocs(q);

    console.log("Nombre voitures:", snapshot.size);

    snapshot.forEach((docItem) => {

        let car = docItem.data();

        let div = document.createElement("div");

        div.innerHTML = `
            <p>${car.marque} ${car.modele} - ${car.prix}</p>

            <button onclick="deleteCar('${docItem.id}')">
                Supprimer
            </button>

            <button onclick="showEdit('${docItem.id}')">
                Modifier
            </button>

            <div id="edit-${docItem.id}" style="display:none">
                <input id="m-${docItem.id}" value="${car.marque}">
                <input id="mo-${docItem.id}" value="${car.modele}">
                <input id="p-${docItem.id}" value="${car.prix}">
                <button onclick="saveEdit('${docItem.id}')">OK</button>
            </div>

            <hr>
        `;

        container.appendChild(div);
    });
}

// ======================
// DELETE
// ======================
window.deleteCar = async function(id) {

    console.log("Suppression:", id);

    await deleteDoc(doc(db, "cars", id));

    alert("Supprimé");

    loadCars();
};

// ======================
// EDIT SHOW
// ======================
window.showEdit = function(id) {

    let el = document.getElementById("edit-" + id);

    el.style.display = (el.style.display === "none") ? "block" : "none";
};

// ======================
// SAVE EDIT
// ======================
window.saveEdit = async function(id) {

    let marque = document.getElementById("m-" + id).value;
    let modele = document.getElementById("mo-" + id).value;
    let prix = document.getElementById("p-" + id).value;

    console.log("Update:", id);

    await updateDoc(doc(db, "cars", id), {
        marque,
        modele,
        prix
    });

    alert("Modifié");

    loadCars();
};

// ======================
// LOGOUT
// ======================
window.logout = function () {
    signOut(auth);
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage vendeur - Motoa</title>

    <style>

        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #28a745;
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-primary {
            background: #28a745;
            color: white;
            width: 100%;
        }

        .btn-danger {
            background: red;
            color: white;
        }

        .btn-edit {
            background: orange;
            color: white;
        }

        .btn-logout {
            background: black;
            color: white;
            width: 100%;
        }

        .car {
            background: white;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .edit-box {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<header>
    <h2>🚗 Mon garage</h2>
    <p id="userInfo">Chargement...</p>
</header>

<div class="container">

    <button class="btn-logout" onclick="logout()">Se déconnecter</button>

    <h3>➕ Ajouter une voiture</h3>

    <input id="marque" placeholder="Marque">
    <input id="modele" placeholder="Modèle">
    <input id="prix" placeholder="Prix">

    <button class="btn-primary" onclick="addCar()">Ajouter</button>

    <h3>📦 Mes voitures</h3>

    <div id="carList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
    getAuth, 
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs,
    query,
    where,
    deleteDoc,
    doc,
    updateDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// AUTH
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        alert("Non connecté !");
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    document.getElementById("userInfo").innerText =
        "Connecté : " + user.email;

    loadCars();
});

// ADD
window.addCar = async function () {

    let marque = document.getElementById("marque").value;
    let modele = document.getElementById("modele").value;
    let prix = document.getElementById("prix").value;

    if (!marque || !modele || !prix) {
        alert("Remplis tous les champs !");
        return;
    }

    await addDoc(collection(db, "cars"), {
        marque,
        modele,
        prix,
        userId: currentUser.uid
    });

    alert("Voiture ajoutée 🚗");

    // reset champs
    document.getElementById("marque").value = "";
    document.getElementById("modele").value = "";
    document.getElementById("prix").value = "";

    loadCars();
};

// LOAD
async function loadCars() {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const q = query(
        collection(db, "cars"),
        where("userId", "==", currentUser.uid)
    );

    const snapshot = await getDocs(q);

    snapshot.forEach((docItem) => {

        let car = docItem.data();

        let div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
            <p><b>${car.marque} ${car.modele}</b></p>
            <p>💰 ${car.prix} FCFA</p>

            <div class="actions">
                <button class="btn-danger" onclick="deleteCar('${docItem.id}')">Supprimer</button>
                <button class="btn-edit" onclick="showEdit('${docItem.id}')">Modifier</button>
            </div>

            <div id="edit-${docItem.id}" class="edit-box" style="display:none">
                <input id="m-${docItem.id}" value="${car.marque}">
                <input id="mo-${docItem.id}" value="${car.modele}">
                <input id="p-${docItem.id}" value="${car.prix}">
                <button class="btn-primary" onclick="saveEdit('${docItem.id}')">Enregistrer</button>
            </div>
        `;

        container.appendChild(div);
    });
}

// DELETE
window.deleteCar = async function(id) {

    await deleteDoc(doc(db, "cars", id));

    alert("Supprimé");

    loadCars();
};

// SHOW EDIT
window.showEdit = function(id) {

    let el = document.getElementById("edit-" + id);

    el.style.display = (el.style.display === "none") ? "block" : "none";
};

// SAVE EDIT
window.saveEdit = async function(id) {

    let marque = document.getElementById("m-" + id).value;
    let modele = document.getElementById("mo-" + id).value;
    let prix = document.getElementById("p-" + id).value;

    await updateDoc(doc(db, "cars", id), {
        marque,
        modele,
        prix
    });

    alert("Modifié");

    loadCars();
};

// LOGOUT
window.logout = function () {
    signOut(auth);
};

</script>

</body>
</html>

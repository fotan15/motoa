<!DOCTYPE html>
<html>
<head>
    <title>Garage vendeur - Motoa</title>
</head>

<body>

<h2>🚗 Mon garage</h2>

<p id="userInfo"></p>

<button onclick="logout()">Se déconnecter</button>

<h3>Ajouter une voiture</h3>

<input id="marque" placeholder="Marque"><br><br>
<input id="modele" placeholder="Modèle"><br><br>
<input id="prix" placeholder="Prix"><br><br>

<button onclick="addCar()">Ajouter</button>

<h3>Mes voitures</h3>

<div id="carList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
    getAuth, 
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs,
    query,
    where,
    deleteDoc,
    doc,
    updateDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ======================
// USER
// ======================
let currentUser = null;

onAuthStateChanged(auth, async (user) => {

    if (user) {
        currentUser = user;

        // récupérer rôle
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        let role = "inconnu";
        if (docSnap.exists()) {
            role = docSnap.data().role;
        }

        document.getElementById("userInfo").innerText =
            "Connecté : " + user.email + " (" + role + ")";

        loadCars();

    } else {
        window.location.href = "login.html";
    }
});

// ======================
// ADD CAR
// ======================
window.addCar = async function () {

    let marque = document.getElementById("marque").value;
    let modele = document.getElementById("modele").value;
    let prix = document.getElementById("prix").value;

    if (!marque || !modele || !prix) {
        alert("Remplis tous les champs !");
        return;
    }

    await addDoc(collection(db, "cars"), {
        marque,
        modele,
        prix,
        userId: currentUser.uid
    });

    // reset champs
    document.getElementById("marque").value = "";
    document.getElementById("modele").value = "";
    document.getElementById("prix").value = "";

    loadCars();
};

// ======================
// LOAD CARS
// ======================
async function loadCars() {

    let container = document.getElementById("carList");
    container.innerHTML = "";

    const q = query(
        collection(db, "cars"),
        where("userId", "==", currentUser.uid)
    );

    const snapshot = await getDocs(q);

    snapshot.forEach((docItem) => {

        let car = docItem.data();

        let div = document.createElement("div");

        div.innerHTML = `
            <p>
                <b>${car.marque} ${car.modele}</b> - ${car.prix} FCFA
            </p>

            <button onclick="editCar('${docItem.id}', '${car.marque}', '${car.modele}', '${car.prix}')">
                Modifier
            </button>

            <button onclick="deleteCar('${docItem.id}')">
                Supprimer
            </button>

            <div id="edit-${docItem.id}" style="display:none">
                <input id="marque-${docItem.id}" value="${car.marque}">
                <input id="modele-${docItem.id}" value="${car.modele}">
                <input id="prix-${docItem.id}" value="${car.prix}">
                <button onclick="saveEdit('${docItem.id}')">Enregistrer</button>
            </div>

            <hr>
        `;

        container.appendChild(div);
    });
}

// ======================
// DELETE
// ======================
window.deleteCar = async function(id) {

    if (!confirm("Supprimer cette voiture ?")) return;

    await deleteDoc(doc(db, "cars", id));
    loadCars();
};

// ======================
// EDIT
// ======================
window.editCar = function(id) {

    let el = document.getElementById("edit-" + id);

    el.style.display = (el.style.display === "none") ? "block" : "none";
};

// ======================
// SAVE EDIT
// ======================
window.saveEdit = async function(id) {

    let marque = document.getElementById("marque-" + id).value;
    let modele = document.getElementById("modele-" + id).value;
    let prix = document.getElementById("prix-" + id).value;

    await updateDoc(doc(db, "cars", id), {
        marque,
        modele,
        prix
    });

    loadCars();
};

// ======================
// LOGOUT
// ======================
window.logout = function () {
    signOut(auth);
};

</script>

</body>
</html>

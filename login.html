<!DOCTYPE html>
<html>
<head>
    <title>Connexion - Motoa</title>
</head>

<body>

<h2>Connexion</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Se connecter</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
    getAuth, 
    signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { 
    getFirestore, 
    doc, 
    getDoc 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 CONFIG FIREBASE (motoaFree)
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree",
    storageBucket: "motoafree.firebasestorage.app",
    messagingSenderId: "727661050460",
    appId: "1:727661050460:web:72a552bb47b3fe48704499"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ======================
// LOGIN
// ======================
window.login = async function () {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {

        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        console.log("Connecté:", user.uid);

        // 🔍 récupérer rôle
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {

            let data = docSnap.data();
            let role = data.role;

            console.log("Role:", role);

            // 🚀 REDIRECTION
            if (role === "seller") {
                window.location.href = "seller.html";
            } else {
                window.location.href = "index.html";
            }

        } else {
            document.getElementById("msg").innerText = "❌ Utilisateur non trouvé";
        }

    } catch (error) {

        console.error(error);
        document.getElementById("msg").innerText = "❌ " + error.message;
    }
};

</script>

</body>
</html>

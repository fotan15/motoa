<!DOCTYPE html>
<html>
<head>
    <title>Login - Motoa</title>
</head>

<body>

<h2>Connexion</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Se connecter</button>

<p>Pas de compte ? <a href="register.html">Créer un compte</a></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
    getAuth, 
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { 
    getFirestore, 
    doc, 
    getDoc 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBCtuE513iVtDMtAaXNtrpfPbXvWjUTXR4",
    authDomain: "motoafree.firebaseapp.com",
    projectId: "motoafree"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ======================
// LOGIN
// ======================
window.login = async function () {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {

        const userCredential = await signInWithEmailAndPassword(auth, email, password);

        const user = userCredential.user;

        console.log("Connecté:", user.uid);

        // 🔥 récupérer rôle
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
            alert("Utilisateur sans rôle !");
            return;
        }

        const role = docSnap.data().role;

        console.log("Role:", role);

        // 🚀 REDIRECTION
        if (role === "seller") {
            window.location.href = "seller.html";
        } else if (role === "buyer") {
            window.location.href = "index.html";
        } else if (role === "admin") {
            window.location.href = "admin.html";
        } else {
            alert("Rôle inconnu !");
        }

    } catch (error) {
        alert("Erreur: " + error.message);
        console.error(error);
    }
};

</script>

</body>
</html>
